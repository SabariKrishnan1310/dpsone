<!DOCTYPE html>
<html lang="en" class="h-full bg-[#FBFBFD] antialiased" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SterlingONE | Campus OS{% endblock %}</title>
    <!-- PostCSS/Tailwind would be built in prod, using CDN for dev -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .shadow-aura { box-shadow: 0 8px 32px rgba(0,0,0,0.04); }
        .transition-smooth { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .hover-scale { @apply transition-smooth hover:scale-[1.02]; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-full flex overflow-hidden text-gray-900" x-data="globalState()">
    
    <!-- Vellum Navigation Rail -->
    <div class="w-[72px] h-full flex flex-col items-center py-6 glass border-r border-gray-200 shadow-aura z-20 flex-shrink-0">
        <div class="h-10 w-10 rounded-xl bg-black text-white flex items-center justify-center font-bold text-xl mb-8 shadow-sm hover-scale cursor-pointer">
            S
        </div>
        
        <nav class="flex-1 w-full flex flex-col gap-6 items-center">
            <!-- Global Dashboard -->
            <a href="/dashboard/edu/" class="relative p-3 rounded-xl transition-smooth group" :class="isActive('/') ? 'bg-black/5 text-black hover-scale' : 'text-gray-400 hover:text-black hover:bg-black/5 hover-scale'" title="Global Dashboard">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
                </svg>
                <div x-show="isActive('/')" class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-8 bg-black rounded-r-md"></div>
            </a>

            <!-- Student Hub -->
            <a href="/dashboard/edu/student-hub/" class="relative p-3 rounded-xl transition-smooth group" :class="isActive('/student-hub/') ? 'bg-black/5 text-black hover-scale' : 'text-gray-400 hover:text-black hover:bg-black/5 hover-scale'" title="Student Hub">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.436 60.436 0 00-.491 6.347A48.627 48.627 0 0112 20.904a48.627 48.627 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.57 50.57 0 00-2.658-.813A59.905 59.905 0 0112 3.493a59.902 59.902 0 0110.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.697 50.697 0 0112 13.489a50.702 50.702 0 017.74-3.342M6.75 15a.75.75 0 100-1.5.75.75 0 000 1.5zm0 0v-3.675A55.378 55.378 0 0112 8.443m-7.007 11.55A5.981 5.981 0 006.75 15.75v-1.5" />
                </svg>
                <div x-show="isActive('/student-hub/')" class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-8 bg-black rounded-r-md"></div>
            </a>

            <!-- Teacher Hub -->
            <a href="/dashboard/edu/teacher-hub/" class="relative p-3 rounded-xl transition-smooth group" :class="isActive('/teacher-hub/') ? 'bg-black/5 text-black hover-scale' : 'text-gray-400 hover:text-black hover:bg-black/5 hover-scale'" title="Teacher Hub">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
                </svg>
                <div x-show="isActive('/teacher-hub/')" class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-8 bg-black rounded-r-md"></div>
            </a>

            <!-- Staff Hub -->
            <a href="/dashboard/edu/staff-hub/" class="relative p-3 rounded-xl transition-smooth group" :class="isActive('/staff-hub/') ? 'bg-black/5 text-black hover-scale' : 'text-gray-400 hover:text-black hover:bg-black/5 hover-scale'" title="Staff Hub">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 00.75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 00-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0112 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 01-.673-.38m0 0A2.18 2.18 0 013 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 013.413-.387m7.5 0V5.25A2.25 2.25 0 0013.5 3h-3a2.25 2.25 0 00-2.25 2.25v.894m7.5 0a48.667 48.667 0 00-7.5 0M12 12.75h.008v.008H12v-.008z" />
                </svg>
                <div x-show="isActive('/staff-hub/')" class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-8 bg-black rounded-r-md"></div>
            </a>
            
            <!-- Directory -->
            <a href="/dashboard/edu/directory/" class="relative p-3 rounded-xl transition-smooth group" :class="isActive('/directory/') ? 'bg-black/5 text-black hover-scale' : 'text-gray-400 hover:text-black hover:bg-black/5 hover-scale'" title="Directory">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 12h.007v.008H3.75V12zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm-.375 5.25h.007v.008H3.75v-.008zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
                </svg>
                <div x-show="isActive('/directory/')" class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-8 bg-black rounded-r-md"></div>
            </a>

            <!-- System -->
            <a href="/dashboard/edu/system/" class="relative p-3 rounded-xl transition-smooth group" :class="isActive('/system/') ? 'bg-black/5 text-black hover-scale' : 'text-gray-400 hover:text-black hover:bg-black/5 hover-scale'" title="System">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.34 15.84c-.468.05-.926.124-1.378.223a.75.75 0 01-.814-.388L6.87 13.5a.75.75 0 01.127-.86l1.076-1.122c.112-.116.142-.284.077-.432A7.954 7.954 0 008 10c0-.368.04-.727.116-1.076.065-.148.035-.316-.077-.432l-1.076-1.122a.75.75 0 01-.127-.86l1.278-2.174a.75.75 0 01.814-.388c.452.099.91.173 1.378.223.155.016.297-.067.368-.2l.745-1.408A.75.75 0 0112 2h0a.75.75 0 01.666.407l.745 1.408c.071.133.213.216.368.2.468-.05.926-.124 1.378-.223a.75.75 0 01.814.388l1.278 2.174a.75.75 0 01-.127.86l-1.076 1.122c-.112.116-.142.284-.077.432.076.349.116.708.116 1.076 0 .368-.04.727-.116 1.076-.065.148-.035.316.077.432l1.076 1.122a.75.75 0 01.127.86l-1.278 2.174a.75.75 0 01-.814.388c-.452-.099-.91-.173-1.378-.223-.155-.016-.297.067-.368.2l-.745 1.408A.75.75 0 0112 22h0a.75.75 0 01-.666-.407l-.745-1.408c-.071-.133-.213-.216-.368-.2z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <div x-show="isActive('/system/')" class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-8 bg-black rounded-r-md"></div>
            </a>
        </nav>
        
        <a href="/dashboard/edu/logout/" class="p-3 rounded-xl text-gray-400 hover:text-red-500 hover:bg-red-50 hover-scale transition-smooth mt-auto" title="Sign out">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
            </svg>
        </a>
    </div>

    <!-- Main Content Area -->
<div class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
        <!-- Global Identity Modal (Shared) -->
        <div x-show="isIdentityModalOpen" class="relative z-50" aria-labelledby="slide-over-title" role="dialog" aria-modal="true" style="display: none;">
            <div x-show="isIdentityModalOpen" x-transition.opacity class="fixed inset-0 bg-gray-900/30 backdrop-blur-sm"></div>
            <div class="fixed inset-0 overflow-hidden">
                <div class="absolute inset-0 overflow-hidden">
                    <div class="pointer-events-none fixed inset-y-0 right-0 flex max-w-full pl-10">
                        <div x-show="isIdentityModalOpen" 
                             x-transition:enter="transform transition ease-in-out duration-300" 
                             x-transition:enter-start="translate-x-full" 
                             x-transition:enter-end="translate-x-0" 
                             x-transition:leave="transform transition ease-in-out duration-300" 
                             x-transition:leave-start="translate-x-0" 
                             x-transition:leave-end="translate-x-full" 
                             class="pointer-events-auto w-screen max-w-lg bg-white/98 backdrop-blur-2xl shadow-2xl flex flex-col"
                             @click.away="isIdentityModalOpen = false">
                            
                            <!-- Modal Header -->
                            <div class="px-8 py-6 flex items-center justify-between border-b border-gray-100 bg-gradient-to-r from-gray-50 to-white">
                                <div>
                                    <h2 class="text-xl font-bold text-black" x-text="editingUser ? 'Edit Identity' : 'New Identity'"></h2>
                                    <p class="text-xs text-gray-400 mt-1">Create or update campus identity</p>
                                </div>
                                <button @click="isIdentityModalOpen = false" class="p-2 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-smooth">
                                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                                </button>
                            </div>
                            
                            <!-- Modal Body -->
                            <div class="flex-1 overflow-y-auto px-8 py-6">
                                <form method="post" action="/dashboard/edu/identity/" class="flex flex-col h-full">
                                    {% csrf_token %}
                                    <div class="space-y-5 flex-1">
                                        <!-- Name Fields -->
                                        <div class="grid grid-cols-2 gap-4">
                                            <div>
                                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">First Name</label>
                                                <input type="text" name="first_name" class="block w-full rounded-lg border border-gray-200 py-2.5 px-4 text-black shadow-sm focus:ring-2 focus:ring-black focus:border-transparent sm:text-sm transition-smooth bg-white" :value="editingUser ? editingUser.name.split(' ')[0] : ''" required>
                                            </div>
                                            <div>
                                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Last Name</label>
                                                <input type="text" name="last_name" class="block w-full rounded-lg border border-gray-200 py-2.5 px-4 text-black shadow-sm focus:ring-2 focus:ring-black focus:border-transparent sm:text-sm transition-smooth bg-white" :value="editingUser ? (editingUser.name.split(' ').slice(1).join(' ') || '') : ''" required>
                                            </div>
                                        </div>
                                        
                                        <!-- Role Selector -->
                                        <div>
                                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Role</label>
                                            <div class="flex gap-3">
                                                <template x-for="r in ['student', 'teacher', 'staff']">
                                                    <button type="button" @click="editingUserRole = r" class="flex-1 py-2.5 px-4 rounded-lg text-sm font-medium border transition-smooth" :class="editingUserRole === r ? 'bg-black text-white border-black' : 'bg-white text-gray-600 border-gray-200 hover:border-gray-300'" x-text="r.charAt(0).toUpperCase() + r.slice(1)"></button>
                                                </template>
                                            </div>
                                            <input type="hidden" name="role" :value="editingUserRole">
                                        </div>

                                        <!-- Context-Aware Fields: STUDENT -->
                                        <div x-show="editingUserRole === 'student'" x-collapse class="space-y-4 bg-blue-50/50 p-4 rounded-xl">
                                            <div class="flex items-center gap-2 mb-2">
                                                <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                                                <span class="text-xs font-semibold text-blue-600 uppercase">Student Details</span>
                                            </div>
                                            <div>
                                                <label class="block text-xs font-medium text-gray-600 mb-1">Grade & Section</label>
                                                <select name="home_section" class="block w-full rounded-lg border border-gray-200 py-2 px-3 text-black text-sm bg-white">
                                                    <option value="">Select Section</option>
                                                    {% for s in sections %}
                                                    <option value="{{ s.id }}">{{ s.grade.name }} - {{ s.name }}</option>
                                                    {% endfor %}
                                                </select>
                                            </div>
                                            <div>
                                                <label class="block text-xs font-medium text-gray-600 mb-1">Roll Number</label>
                                                <input type="text" name="roll_number" class="block w-full rounded-lg border border-gray-200 py-2 px-3 text-black text-sm bg-white" placeholder="e.g. 12">
                                            </div>
                                        </div>

                                        <!-- Context-Aware Fields: TEACHER -->
                                        <div x-show="editingUserRole === 'teacher'" x-collapse class="space-y-4 bg-green-50/50 p-4 rounded-xl">
                                            <div class="flex items-center gap-2 mb-2">
                                                <span class="w-2 h-2 rounded-full bg-green-500"></span>
                                                <span class="text-xs font-semibold text-green-600 uppercase">Teacher Details</span>
                                            </div>
                                            <div>
                                                <label class="block text-xs font-medium text-gray-600 mb-1">Class Teacher For (Optional)</label>
                                                <select name="class_teacher_for" class="block w-full rounded-lg border border-gray-200 py-2 px-3 text-black text-sm bg-white">
                                                    <option value="">Select Class</option>
                                                    {% for s in sections %}
                                                    <option value="{{ s.id }}">{{ s.grade.name }} - {{ s.name }}</option>
                                                    {% endfor %}
                                                </select>
                                            </div>
                                            <div>
                                                <label class="block text-xs font-medium text-gray-600 mb-1">Department</label>
                                                <input type="text" name="department" class="block w-full rounded-lg border border-gray-200 py-2 px-3 text-black text-sm bg-white" placeholder="e.g. Mathematics, Science">
                                            </div>
                                        </div>

                                        <!-- Context-Aware Fields: STAFF -->
                                        <div x-show="editingUserRole === 'staff'" x-collapse class="space-y-4 bg-purple-50/50 p-4 rounded-xl">
                                            <div class="flex items-center gap-2 mb-2">
                                                <span class="w-2 h-2 rounded-full bg-purple-500"></span>
                                                <span class="text-xs font-semibold text-purple-600 uppercase">Staff Details</span>
                                            </div>
                                            <div>
                                                <label class="block text-xs font-medium text-gray-600 mb-1">Department</label>
                                                <input type="text" name="department" class="block w-full rounded-lg border border-gray-200 py-2 px-3 text-black text-sm bg-white" placeholder="e.g. Security, Admin">
                                            </div>
                                            <div class="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label class="block text-xs font-medium text-gray-600 mb-1">Shift Start</label>
                                                    <input type="time" name="shift_start" class="block w-full rounded-lg border border-gray-200 py-2 px-3 text-black text-sm bg-white">
                                                </div>
                                                <div>
                                                    <label class="block text-xs font-medium text-gray-600 mb-1">Shift End</label>
                                                    <input type="time" name="shift_end" class="block w-full rounded-lg border border-gray-200 py-2 px-3 text-black text-sm bg-white">
                                                </div>
                                            </div>
                                        </div>

                                        <!-- RFID Field -->
                                        <div>
                                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">RFID Card HEX</label>
                                            <div class="relative">
                                                <input type="text" name="rfid_number" class="block w-full rounded-lg border border-gray-200 py-2.5 px-4 text-black shadow-sm focus:ring-2 focus:ring-black focus:border-transparent sm:text-sm transition-smooth bg-white font-mono" placeholder="e.g. 0A1B2C3D">
                                                <div class="absolute right-3 top-1/2 -translate-y-1/2">
                                                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                                </div>
                                            </div>
                                            <p class="text-xs text-gray-400 mt-1">Auto-hashed on save • Hardware ready instantly</p>
                                        </div>
                                    </div>
                                    
                                    <!-- Modal Footer -->
                                    <div class="mt-6 pt-4 border-t border-gray-100 flex gap-3">
                                        <button type="button" @click="isIdentityModalOpen = false" class="flex-1 py-2.5 rounded-lg bg-gray-100 text-gray-700 font-medium text-sm hover:bg-gray-200 transition-smooth">Cancel</button>
                                        <button type="submit" class="flex-1 py-2.5 rounded-lg bg-black text-white font-medium text-sm hover:bg-gray-800 hover-scale transition-smooth shadow-lg" x-text="editingUser ? 'Save Changes' : 'Create Identity'"></button>
                                    </div>
                                </form>
                            </div>
</div>
                    </div>
                </div>
            </div>
        </div>

        {% block content %}{% endblock content %}
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('globalState', () => ({
                isIdentityModalOpen: false,
                editingUser: null,
                editingUserRole: 'student',
                
                isActive(path) {
                    if (path === '/') return window.location.pathname === '/dashboard/edu/';
                    return window.location.pathname.includes(path);
                },

                openNewIdentity() {
                    this.editingUser = null;
                    this.editingUserRole = 'student';
                    this.isIdentityModalOpen = true;
                },

                openEditModal(tap) {
                    this.editingUser = { ...tap };
                    this.editingUserRole = tap.role ? tap.role.toLowerCase() : 'student';
                    this.isIdentityModalOpen = true;
                }
            }));
        });
    </script>
</body>
</html>
